<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>公平猜拳 - 角色大亂鬥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#0D0D1A 0%,#1A1A2E 50%,#0D0D1A 100%);
  min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;
  color:#F5F5F5;display:flex;justify-content:center;padding:8px;
  overflow-x:hidden;
}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:6px;padding-bottom:30px}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 30% 60%,#FFF 100%,transparent),
    radial-gradient(1.5px 1.5px at 50% 10%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 70% 40%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 90% 80%,#FFF 100%,transparent),
    radial-gradient(1.5px 1.5px at 15% 85%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 85% 15%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 45% 45%,#FFF 100%,transparent),
    radial-gradient(1.5px 1.5px at 25% 35%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 75% 75%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 5% 50%,#FFF 100%,transparent),
    radial-gradient(1px 1px at 95% 50%,#FFF 100%,transparent),
    radial-gradient(1.5px 1.5px at 40% 75%,#FFF 100%,transparent);
  pointer-events:none;z-index:0;
}

header{text-align:center;position:relative;z-index:1;width:100%;padding:10px 0 4px}
h1{
  font-size:1.8rem;font-weight:900;
  color:#FFD700;text-shadow:
    0 0 10px rgba(255,107,0,.6),
    0 2px 0 #CC5500,0 -1px 0 #CC5500,
    2px 0 0 #CC5500,-2px 0 0 #CC5500;
  letter-spacing:4px;display:inline-block;
}
h1::before{content:'⚡';margin-right:6px}
h1::after{content:'⚡';margin-left:6px}
.subtitle{font-size:.65rem;color:#FF8A5C;letter-spacing:4px;text-transform:uppercase;margin-top:-4px;opacity:.8}

.sec-title{font-size:.7rem;color:#FFD700;letter-spacing:2px;text-align:center;padding:3px 0;opacity:.5;width:100%}

/* ===== character pool ===== */
#char-pool{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:8px;padding:6px;
  width:100%;position:relative;z-index:1;
}
.char{
  width:62px;height:62px;border-radius:50%;
  position:relative;cursor:pointer;
  transition:transform .2s,filter .2s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.char:active{transform:scale(.9)}
.char.picked{filter:brightness(.35);cursor:not-allowed;transform:scale(.88)}
.char.picked::after{
  content:'✓';position:absolute;bottom:-1px;right:-1px;
  width:18px;height:18px;background:#2ECC71;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:bold;color:#fff;
  border:2px solid #1A1A2E;z-index:5;
}
.char-inner{
  width:58px;height:58px;border-radius:50%;position:relative;
  overflow:hidden;transition:border-color .2s;
}
.char:not(.picked):hover .char-inner{filter:brightness(1.15)}

/* custom image face */
.custom-face{
  width:100%;height:100%;border-radius:50%;
  position:absolute;inset:0;z-index:4;
}

/* ===== face building blocks ===== */
.skin{
  width:42px;height:42px;border-radius:50%;position:absolute;
  z-index:1;top:50%;left:50%;transform:translate(-50%,-50%);
}
.hair{position:absolute;z-index:3}
.eye-pair{
  position:absolute;z-index:4;
  display:flex;gap:6px;justify-content:center;align-items:center;
}
.eye{
  width:5px;height:6px;background:#2C2C2C;border-radius:50%;position:relative;
}
.eye::after{
  content:'';position:absolute;top:1px;right:0;
  width:2px;height:2px;background:#fff;border-radius:50%;
}
.mouth{position:absolute;z-index:4;border-radius:50%}
.accessory{position:absolute;z-index:5}

/* c0 - 小女孩 */
.c0 .char-inner{background:linear-gradient(135deg,#FF9EBB,#E87A9F)}
.c0 .skin{background:#FDE8D0;width:40px;height:38px;top:54%}
.c0 .hair{
  top:-2px;left:50%;transform:translateX(-50%);
  width:50px;height:20px;background:#5C3A1E;border-radius:50% 50% 0 0;
}
.c0 .hair::after{
  content:'';position:absolute;bottom:-10px;left:4px;
  width:10px;height:14px;background:#5C3A1E;border-radius:50%;
  box-shadow:28px 0 0 0 #5C3A1E;
}
.c0 .hair-bow{
  position:absolute;top:4px;left:50%;transform:translateX(8px);
  width:8px;height:6px;background:#E74C3C;border-radius:50%;z-index:6;
  box-shadow:-24px 0 0 0 #E74C3C;
}
.c0 .eye-pair{top:22px;gap:8px}
.c0 .eye{width:6px;height:7px}
.c0 .eye::after{width:2.5px;height:2.5px}
.c0 .mouth{
  top:31px;width:8px;height:4px;
  border-bottom:2px solid #D45A5A;border-radius:0 0 50% 50%;
}

/* c1 - 少年 */
.c1 .char-inner{background:linear-gradient(135deg,#74B9FF,#5A9FE6)}
.c1 .skin{background:#F5D6B8;width:40px;height:38px;top:54%}
.c1 .hair{
  top:-3px;left:50%;transform:translateX(-50%);
  width:48px;height:22px;background:#3E2723;border-radius:50% 50% 0 0;
}
.c1 .hair::before{
  content:'';position:absolute;top:8px;left:-2px;
  width:8px;height:6px;background:#3E2723;border-radius:50%;
  box-shadow:38px 0 0 0 #3E2723;
}
.c1 .eye-pair{top:22px;gap:7px}
.c1 .eye{width:5px;height:6px}
.c1 .mouth{
  top:31px;width:7px;height:3px;
  border-bottom:2px solid #D47A5A;border-radius:0 0 50% 50%;
}

/* c2 - 少女 */
.c2 .char-inner{background:linear-gradient(135deg,#A29BFE,#8A84E6)}
.c2 .skin{background:#FDE8D0;width:40px;height:40px;top:52%}
.c2 .hair{
  top:-4px;left:50%;transform:translateX(-50%);
  width:50px;height:24px;background:#1a1a1a;border-radius:50% 50% 30% 30%;
}
.c2 .hair::before{
  content:'';position:absolute;top:10px;left:-6px;
  width:12px;height:22px;background:#1a1a1a;border-radius:50% 20% 40% 30%;
}
.c2 .hair::after{
  content:'';position:absolute;top:10px;right:-6px;
  width:12px;height:22px;background:#1a1a1a;border-radius:20% 50% 30% 40%;
}
.c2 .eye-pair{top:21px;gap:9px}
.c2 .eye{width:6px;height:7px}
.c2 .eye::after{width:2.5px;height:2.5px;top:1.5px}
.c2 .mouth{
  top:30px;width:6px;height:3px;
  border-bottom:2px solid #D47A6A;border-radius:0 0 50% 50%;
}

/* c3 - 老奶奶 */
.c3 .char-inner{background:linear-gradient(135deg,#D4A574,#C08D5A)}
.c3 .skin{background:#D4A574;width:40px;height:38px;top:54%}
.c3 .hair{
  top:2px;left:50%;transform:translateX(-50%);
  width:46px;height:18px;background:#B0B0B0;border-radius:50% 50% 0 0;
}
.c3 .hair-bun{
  position:absolute;top:0;right:0;z-index:6;
  width:12px;height:10px;background:#B0B0B0;border-radius:50%;
}
.c3 .eye-pair{top:22px;gap:5px}
.c3 .eye{width:4px;height:4px;background:#555}
.c3 .eye::after{display:none}
.c3 .glasses{
  top:20px;left:50%;transform:translateX(-50%);
  width:28px;height:10px;border:1.5px solid #8B7355;border-radius:50%;z-index:6;
}
.c3 .mouth{
  top:31px;width:6px;height:3px;border-bottom:1.5px solid #A08060;
  border-radius:0 0 50% 50%;
}
.c3 .wrinkle1{
  position:absolute;top:29px;left:14px;width:8px;height:1px;
  background:#C09070;z-index:5;transform:rotate(-10deg);
  box-shadow:16px 0 0 0 #C09070;
}

/* c4 - 老爺爺 */
.c4 .char-inner{background:linear-gradient(135deg,#6B8E5A,#5A7A4A)}
.c4 .skin{background:#D4A574;width:38px;height:42px;top:52%}
.c4 .hair{
  top:0;left:50%;transform:translateX(-50%);
  width:50px;height:8px;background:#C0C0C0;border-radius:4px;
}
.c4 .hair::before{
  content:'';position:absolute;bottom:-8px;left:-2px;
  width:10px;height:16px;background:#C0C0C0;border-radius:50% 0 50% 30%;
}
.c4 .hair::after{
  content:'';position:absolute;bottom:-8px;right:-2px;
  width:10px;height:16px;background:#C0C0C0;border-radius:0 50% 30% 50%;
}
.c4 .eye-pair{top:22px;gap:5px}
.c4 .eye{width:4px;height:4px;background:#555}
.c4 .eye::after{display:none}
.c4 .glasses{
  top:19px;left:50%;transform:translateX(-50%);
  width:30px;height:12px;border:1.5px solid #8B7355;border-radius:4px;z-index:6;
}
.c4 .mustache{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  width:18px;height:6px;z-index:6;
  border-bottom:3px solid #E0E0E0;border-radius:0 0 50% 50%;
}
.c4 .mouth{
  top:32px;width:5px;height:3px;border-bottom:1.5px solid #A08060;
  border-radius:0 0 50% 50%;
}
.c4 .eyebrow-l{
  position:absolute;top:18px;left:12px;width:8px;height:2px;
  background:#C0C0C0;z-index:7;transform:rotate(10deg);
}
.c4 .eyebrow-r{
  position:absolute;top:18px;right:12px;width:8px;height:2px;
  background:#C0C0C0;z-index:7;transform:rotate(-10deg);
}

/* c5 - 漁夫 */
.c5 .char-inner{background:linear-gradient(135deg,#2D9DB5,#25839E)}
.c5 .skin{background:#D4A574;width:40px;height:40px;top:52%}
.c5 .hair{display:none}
.c5 .hat{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:52px;height:16px;background:#8B7D6B;border-radius:50% 50% 0 0;z-index:6;
}
.c5 .hat::after{
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:44px;height:8px;background:#A0907A;border-radius:0 0 50% 50%;
}
.c5 .eye-pair{top:22px;gap:6px}
.c5 .eye{width:4px;height:5px;background:#444}
.c5 .eye::after{width:1.5px;height:1.5px}
.c5 .beard-stubble{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  width:26px;height:10px;z-index:2;
  background:radial-gradient(3px 2px at 4px 2px,#B09070 100%,transparent),
    radial-gradient(3px 2px at 12px 0,#B09070 100%,transparent),
    radial-gradient(3px 2px at 20px 2px,#B09070 100%,transparent),
    radial-gradient(3px 2px at 8px 5px,#B09070 100%,transparent),
    radial-gradient(3px 2px at 16px 5px,#B09070 100%,transparent);
}
.c5 .mouth{
  top:32px;width:6px;height:3px;
  border-bottom:1.5px solid #A08060;border-radius:0 0 50% 50%;
}

/* c6 - 屠夫 */
.c6 .char-inner{background:linear-gradient(135deg,#C44545,#B03A3A)}
.c6 .skin{background:#D4A574;width:42px;height:40px;top:54%}
.c6 .hair{display:none}
.c6 .bandana{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);
  width:54px;height:16px;background:#E74C3C;z-index:6;border-radius:4px;
}
.c6 .bandana::after{
  content:'';position:absolute;bottom:-6px;right:-2px;
  width:8px;height:8px;background:#E74C3C;clip-path:polygon(0 0,100% 0,50% 100%);
}
.c6 .eye-pair{top:22px;gap:5px}
.c6 .eye{width:4px;height:5px;background:#3a3a3a}
.c6 .eye::after{width:1.5px;height:1.5px}
.c6 .eyebrow-l{
  position:absolute;top:17px;left:10px;width:10px;height:3px;
  background:#3a2a1a;z-index:7;border-radius:2px;transform:rotate(-5deg);
}
.c6 .eyebrow-r{
  position:absolute;top:17px;right:10px;width:10px;height:3px;
  background:#3a2a1a;z-index:7;border-radius:2px;transform:rotate(5deg);
}
.c6 .mouth{
  top:30px;width:7px;height:4px;
  border-bottom:2px solid #A06050;border-radius:0 0 50% 50%;
}

/* c7 - 農夫 */
.c7 .char-inner{background:linear-gradient(135deg,#F5CD79,#E8BA60)}
.c7 .skin{background:#E8C49A;width:40px;height:38px;top:54%}
.c7 .hair{display:none}
.c7 .straw-hat{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:56px;height:20px;background:#D4A040;border-radius:50% 50% 0 0;z-index:6;
}
.c7 .straw-hat::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:40px;height:4px;background:#C09030;border-radius:0 0 50% 50%;
}
.c7 .eye-pair{top:20px;gap:7px}
.c7 .eye{width:5px;height:5px;background:#3a3a3a}
.c7 .eye::after{width:1.5px;height:1.5px}
.c7 .mouth{
  top:29px;width:8px;height:4px;
  border-bottom:2px solid #B07050;border-radius:0 0 50% 50%;
}
.c7 .cheek-l{
  position:absolute;top:24px;left:6px;width:8px;height:5px;
  background:rgba(220,100,80,.25);border-radius:50%;z-index:3;
}
.c7 .cheek-r{
  position:absolute;top:24px;right:6px;width:8px;height:5px;
  background:rgba(220,100,80,.25);border-radius:50%;z-index:3;
}

/* c8 - 旅人 */
.c8 .char-inner{background:linear-gradient(135deg,#4A69BD,#3A559E)}
.c8 .skin{background:#F0D5B8;width:36px;height:38px;top:52%}
.c8 .hair{display:none}
.c8 .hood{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:56px;height:34px;background:#6C5B4A;border-radius:50% 50% 30% 30%;z-index:6;
}
.c8 .hood::after{
  content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
  width:28px;height:4px;background:#5A4A3A;border-radius:2px;
}
.c8 .hood-opening{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:22px;height:18px;background:#1A1A2E;border-radius:0 0 40% 40%;z-index:7;
}
.c8 .eye-pair{top:20px;gap:7px;z-index:8}
.c8 .eye{width:5px;height:6px;background:#2C2C2C}
.c8 .eye::after{width:2px;height:2px}
.c8 .mouth{display:none}
.c8 .scarf-lower{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:#8B7355;border-radius:2px;z-index:7;
}

/* c9 - 母親 */
.c9 .char-inner{background:linear-gradient(135deg,#E1B12C,#D4A020)}
.c9 .skin{background:#FDE8D0;width:40px;height:40px;top:52%}
.c9 .hair{
  top:-3px;left:50%;transform:translateX(-50%);
  width:50px;height:20px;background:#7A4A2A;border-radius:50% 50% 0 0;z-index:3;
}
.c9 .hair::before{
  content:'';position:absolute;top:8px;left:-5px;
  width:10px;height:18px;background:#7A4A2A;border-radius:50% 10% 40% 20%;
}
.c9 .hair::after{
  content:'';position:absolute;top:8px;right:-5px;
  width:10px;height:18px;background:#7A4A2A;border-radius:10% 50% 20% 40%;
}
.c9 .hair-wave{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:34px;height:8px;border-bottom:2.5px solid #9A6A4A;
  border-radius:0 0 50% 50%;z-index:4;opacity:.6;
}
.c9 .eye-pair{top:21px;gap:8px}
.c9 .eye{width:5px;height:6px;background:#2C2C2C}
.c9 .eye::after{width:2px;height:2px}
.c9 .mouth{
  top:30px;width:7px;height:3px;
  border-bottom:2px solid #D47A6A;border-radius:0 0 50% 50%;
}

/* ===== players area ===== */
#players-area{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  width:100%;min-height:80px;padding:8px;
  background:rgba(255,255,255,.04);
  border:1px dashed rgba(255,215,0,.12);
  border-radius:14px;position:relative;z-index:1;
}
#players-area.empty{
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.2);font-size:.8rem;
}
.player-card{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.player-card.entering{animation:cardIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{
  0%{opacity:0;transform:translateY(20px) scale(.6)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.player-card .mini-avatar{
  width:52px;height:52px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;border:2px solid rgba(255,255,255,.3);
  transition:border-color .3s,box-shadow .3s;
}
.mini-avatar .char-inner{width:48px;height:48px}
.mini-avatar .char-inner .skin{width:34px;height:34px}
.mini-avatar .char-inner .hair,
.mini-avatar .char-inner .hat,
.mini-avatar .char-inner .straw-hat,
.mini-avatar .char-inner .hood,
.mini-avatar .char-inner .bandana{transform:scale(.82);transform-origin:top center}
.mini-avatar .char-inner .glasses{transform:scale(.85)}
.mini-avatar .char-inner .eye-pair{transform:scale(.85)}
.mini-avatar .char-inner .mouth{transform:scale(.85)}
.mini-avatar .char-inner .hair-wave{transform:scale(.85)}
.mini-avatar .char-inner .accessory{transform:scale(.82)}

.player-card .status{font-size:.95rem;height:20px;display:flex;align-items:center;justify-content:center}
.player-card .gesture-display{font-size:1.4rem;height:26px;display:flex;align-items:center;justify-content:center}

.player-card.locked .mini-avatar{border-color:#FF8A5C}
.player-card.locked .status{color:#FF8A5C;font-weight:bold}

.player-card.winner .mini-avatar{
  border-color:#FFD700;box-shadow:0 0 20px rgba(255,215,0,.5),0 0 40px rgba(255,107,0,.3);
  animation:goldPulse 1.2s ease-in-out infinite;
}
@keyframes goldPulse{
  0%,100%{box-shadow:0 0 15px rgba(255,215,0,.4),0 0 30px rgba(255,107,0,.2)}
  50%{box-shadow:0 0 25px rgba(255,215,0,.7),0 0 50px rgba(255,107,0,.4)}
}
.player-card.winner .status{color:#FFD700;font-weight:bold;font-size:1.1rem}
.player-card.loser .status{color:#888;font-size:.75rem}
.player-card.tie .status{color:#85C1E9;font-size:.8rem}

.player-card.winner .mini-avatar::before{
  content:'⚡';position:absolute;top:-8px;right:-6px;font-size:14px;
  animation:lightning 1.5s ease-in-out infinite;z-index:10;
}
.player-card.winner .mini-avatar::after{
  content:'⚡';position:absolute;bottom:-8px;left:-6px;font-size:14px;
  animation:lightning 1.5s ease-in-out infinite .3s;z-index:10;
}
@keyframes lightning{
  0%,100%{opacity:1;transform:scale(1)}
  30%{opacity:1;transform:scale(1.3)}
  60%{opacity:.3;transform:scale(.8)}
}
.player-card.winner .gesture-display::after{content:' 👑';font-size:.7rem}

/* ===== gesture buttons ===== */
#gesture-area{
  width:100%;display:flex;flex-direction:column;align-items:center;
  gap:6px;position:relative;z-index:1;
}
#gesture-area.hidden{display:none}
#gesture-btns{display:flex;gap:14px;justify-content:center}
.gesture-btn{
  width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);font-size:1.8rem;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.gesture-btn:active{transform:scale(.88)}
.gesture-btn:hover{border-color:#FFD700;background:rgba(255,215,0,.1)}

/* ===== prompt ===== */
#prompt{
  font-size:.85rem;color:#FFD700;text-align:center;
  padding:3px 0;min-height:22px;position:relative;z-index:1;
}

/* ===== dragon balls ===== */
#db-progress{
  display:flex;gap:3px;align-items:center;
  position:relative;z-index:1;padding:3px 0;
}
.db{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  transition:all .4s;position:relative;
}
.db.on{
  background:radial-gradient(circle at 35% 35%,#FFD700,#FF6B00);
  border-color:#FFD700;
  box-shadow:0 0 6px rgba(255,107,0,.5);
}
.db.on::after{
  content:'★';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:6px;color:#FFF;text-shadow:0 0 2px rgba(255,255,255,.5);
}
.db-label{font-size:.55rem;color:rgba(255,255,255,.25);margin-left:4px}

/* ===== buttons ===== */
#reveal-btn{
  padding:10px 32px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#FF6B00,#FF4500);
  color:#FFF;font-size:1rem;font-weight:bold;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(255,107,0,.4);
  position:relative;z-index:1;letter-spacing:2px;
}
#reveal-btn:active{transform:scale(.94)}
#reveal-btn:hover{box-shadow:0 4px 30px rgba(255,107,0,.6)}
#reveal-btn.hidden{display:none}

#replay-btn{
  padding:8px 24px;border:2px solid rgba(255,215,0,.35);
  border-radius:50px;background:transparent;color:#FFD700;
  font-size:.9rem;cursor:pointer;transition:all .2s;position:relative;z-index:1;
}
#replay-btn:active{transform:scale(.94)}
#replay-btn:hover{background:rgba(255,215,0,.08);border-color:#FFD700}
#replay-btn.hidden{display:none}

#result-msg{font-size:.95rem;text-align:center;padding:3px 0;min-height:26px;position:relative;z-index:1}

.floating-star{
  position:fixed;font-size:16px;pointer-events:none;
  opacity:0;z-index:10;
  animation:starFloat 2s ease-out forwards;
}
@keyframes starFloat{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-60px) rotate(360deg) scale(.3)}
}

/* ===== overlay & menu ===== */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;
}
.overlay.show{opacity:1;pointer-events:auto}

#char-menu{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:rgba(30,30,50,.95);backdrop-filter:blur(12px);
  border-radius:20px 20px 0 0;padding:16px 20px 30px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
#char-menu.show{transform:translateY(0)}
#char-menu .menu-title{font-size:.85rem;color:rgba(255,255,255,.4);text-align:center;margin-bottom:12px}
#char-menu .menu-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 12px;border-radius:12px;cursor:pointer;
  transition:background .15s;font-size:1rem;
}
#char-menu .menu-item:active{background:rgba(255,255,255,.08)}
#char-menu .menu-item .icon{font-size:1.3rem;width:32px;text-align:center}
#char-menu .menu-item .label{color:#F5F5F5}
#char-menu .menu-cancel{
  margin-top:10px;padding:14px;border-radius:12px;
  background:rgba(255,255,255,.06);text-align:center;
  cursor:pointer;color:rgba(255,255,255,.5);transition:background .15s;
}
#char-menu .menu-cancel:active{background:rgba(255,255,255,.1)}

/* ===== image adjust modal ===== */
#adjust-modal{
  position:fixed;inset:0;z-index:70;
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#adjust-modal.show{display:flex}
#adjust-modal .modal-bg{
  position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:0;
}
#adjust-modal .modal-box{
  position:relative;z-index:1;width:100%;max-width:380px;
  background:rgba(25,25,45,.95);backdrop-filter:blur(16px);
  border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,.08);
}
#adjust-modal .modal-title{
  font-size:1rem;color:#FFD700;text-align:center;margin-bottom:16px;
  font-weight:bold;
}
#preview-wrap{
  width:200px;height:200px;border-radius:50%;overflow:hidden;
  margin:0 auto 16px;position:relative;
  border:3px solid rgba(255,215,0,.3);
  background:#1a1a2e;
}
#preview-img{
  width:100%;height:100%;position:absolute;inset:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  cursor:grab;
}
#preview-img.dragging{cursor:grabbing}
#adjust-modal .zoom-area{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
#adjust-modal .zoom-area label{font-size:.8rem;color:rgba(255,255,255,.5);white-space:nowrap}
#adjust-modal .zoom-area input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;
  background:rgba(255,255,255,.15);border-radius:2px;outline:none;
}
#adjust-modal .zoom-area input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  background:linear-gradient(135deg,#FFD700,#FF6B00);
  border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.3);
}
#adjust-modal .modal-btns{
  display:flex;gap:10px;
}
#adjust-modal .modal-btns button{
  flex:1;padding:12px;border-radius:14px;border:none;
  cursor:pointer;font-size:.9rem;transition:all .15s;
}
#adjust-modal .modal-btns .btn-cancel{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);
}
#adjust-modal .modal-btns .btn-cancel:active{background:rgba(255,255,255,.12)}
#adjust-modal .modal-btns .btn-confirm{
  background:linear-gradient(135deg,#FF6B00,#FF4500);color:#FFF;font-weight:bold;
}
#adjust-modal .modal-btns .btn-confirm:active{transform:scale(.96)}

#file-input{display:none}
</style>
</head>
<body>
<div id="app">

<header>
  <h1>公平猜拳</h1>
  <div class="subtitle">みんなで勝負</div>
</header>

<div id="prompt"></div>

<div id="char-pool"></div>

<div class="sec-title">── 參賽戰士 ──</div>
<div id="players-area" class="empty">
  <span>↑ 選擇你的戰士</span>
</div>

<div id="gesture-area" class="hidden">
  <div style="font-size:.7rem;color:rgba(255,255,255,.45)">選擇你的招式</div>
  <div id="gesture-btns">
    <button class="gesture-btn" data-g="rock">✊</button>
    <button class="gesture-btn" data-g="paper">✋</button>
    <button class="gesture-btn" data-g="scissors">✌️</button>
  </div>
</div>

<div id="db-progress"></div>

<button id="reveal-btn" class="hidden">⚡ 決勝負 ⚡</button>
<div id="result-msg"></div>
<button id="replay-btn" class="hidden">もう一回！再戰 🔥</button>

</div>

<input type="file" id="file-input" accept="image/*">

<div class="overlay" id="overlay"></div>

<div id="char-menu">
  <div class="menu-title">編輯角色頭像</div>
  <div class="menu-item" data-action="camera">
    <span class="icon">📷</span>
    <span class="label">拍照</span>
  </div>
  <div class="menu-item" data-action="gallery">
    <span class="icon">🖼️</span>
    <span class="label">從相簿選擇</span>
  </div>
  <div class="menu-item" data-action="reset">
    <span class="icon">🔄</span>
    <span class="label">回到預設</span>
  </div>
  <div class="menu-cancel" data-action="cancel">取消</div>
</div>

<div id="adjust-modal">
  <div class="modal-bg" id="modal-bg-close"></div>
  <div class="modal-box">
    <div class="modal-title">📐 調整頭像位置</div>
    <div id="preview-wrap">
      <div id="preview-img"></div>
    </div>
    <div class="zoom-area">
      <label>🔍 縮放</label>
      <input type="range" id="zoom-slider" min="1" max="3" step="0.05" value="1">
      <span id="zoom-label" style="font-size:.75rem;color:rgba(255,255,255,.3);min-width:32px">1x</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="adjust-cancel">取消</button>
      <button class="btn-confirm" id="adjust-confirm">✓ 確認使用</button>
    </div>
  </div>
</div>

<script>
const CHAR_DATA = [
  {id:0,bg:'#FF9EBB',cls:'c0'},
  {id:1,bg:'#74B9FF',cls:'c1'},
  {id:2,bg:'#A29BFE',cls:'c2'},
  {id:3,bg:'#D4A574',cls:'c3'},
  {id:4,bg:'#6B8E5A',cls:'c4'},
  {id:5,bg:'#2D9DB5',cls:'c5'},
  {id:6,bg:'#C44545',cls:'c6'},
  {id:7,bg:'#F5CD79',cls:'c7'},
  {id:8,bg:'#4A69BD',cls:'c8'},
  {id:9,bg:'#E1B12C',cls:'c9'},
];

const G_EMOJI = {rock:'✊',paper:'✋',scissors:'✌️'};

let state = {
  phase:'select',curPlayer:0,players:[],
  availChars:CHAR_DATA.map(c=>c.id),selCharId:null,
  menuCharId:null,adjustCharId:null,
};

const poolEl=document.getElementById('char-pool');
const playersEl=document.getElementById('players-area');
const gestureArea=document.getElementById('gesture-area');
const gestureBtns=document.getElementById('gesture-btns');
const promptEl=document.getElementById('prompt');
const dbEl=document.getElementById('db-progress');
const revealBtn=document.getElementById('reveal-btn');
const resultMsg=document.getElementById('result-msg');
const replayBtn=document.getElementById('replay-btn');

/* ---- image related ---- */
const fileInput=document.getElementById('file-input');
const overlay=document.getElementById('overlay');
const charMenu=document.getElementById('char-menu');
const adjustModal=document.getElementById('adjust-modal');
const previewImg=document.getElementById('preview-img');
const zoomSlider=document.getElementById('zoom-slider');
const zoomLabel=document.getElementById('zoom-label');

function lsKey(id){return 'fair-rps-char-'+id}

function getCustom(id){
  try{
    const raw=localStorage.getItem(lsKey(id));
    return raw?JSON.parse(raw):null;
  }catch(e){return null}
}

function setCustom(id,data){
  localStorage.setItem(lsKey(id),JSON.stringify(data));
}

function removeCustom(id){
  localStorage.removeItem(lsKey(id));
}

const CHAR_HTML = {
c0:`<div class="hair"></div><div class="hair-bow accessory"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c1:`<div class="hair"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c2:`<div class="hair"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c3:`<div class="hair"></div><div class="hair-bun accessory"></div><div class="skin"></div><div class="glasses accessory"></div><div class="wrinkle1"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c4:`<div class="hair"></div><div class="skin"></div><div class="eyebrow-l"></div><div class="eyebrow-r"></div><div class="glasses accessory"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mustache"></div><div class="mouth"></div>`,
c5:`<div class="hat accessory"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="beard-stubble"></div><div class="mouth"></div>`,
c6:`<div class="bandana accessory"></div><div class="skin"></div><div class="eyebrow-l"></div><div class="eyebrow-r"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c7:`<div class="straw-hat accessory"></div><div class="skin"></div><div class="cheek-l"></div><div class="cheek-r"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
c8:`<div class="hood accessory"></div><div class="hood-opening"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="scarf-lower"></div>`,
c9:`<div class="hair"></div><div class="hair-wave"></div><div class="skin"></div><div class="eye-pair"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div>`,
};

function charInnerHTML(cls,id){
  const c=getCustom(id);
  if(c&&c.dataUrl){
    const z=c.zoom||1;
    const px=c.px||50;
    const py=c.py||50;
    return `<div class="custom-face" style="background:url('${c.dataUrl}') ${px}% ${py}%/ ${z*100}% auto no-repeat"></div>`;
  }
  return CHAR_HTML[cls]||'';
}

function renderPool(){
  poolEl.innerHTML='';
  CHAR_DATA.forEach(c=>{
    const div=document.createElement('div');
    div.className=`char ${c.cls}`;
    div.dataset.id=c.id;
    if(!state.availChars.includes(c.id)) div.classList.add('picked');
    div.innerHTML=`<div class="char-inner">${charInnerHTML(c.cls,c.id)}</div>`;
    div.addEventListener('click',()=>onCharClick(c.id));
    setupLongPress(div,c.id);
    poolEl.appendChild(div);
  });
}

function renderPlayers(){
  playersEl.innerHTML='';
  playersEl.classList.remove('empty');
  if(state.players.length===0){
    playersEl.classList.add('empty');
    playersEl.innerHTML='<span>↑ 選擇你的戰士</span>';
    return;
  }
  state.players.forEach((p,i)=>{
    const cd=CHAR_DATA.find(c=>c.id===p.charId);
    const card=document.createElement('div');
    card.className='player-card entering';
    card.dataset.idx=i;
    const av=document.createElement('div');
    av.className=`mini-avatar ${cd.cls}`;
    av.innerHTML=`<div class="char-inner">${charInnerHTML(cd.cls,p.charId)}</div>`;
    const gd=document.createElement('div');
    gd.className='gesture-display';
    const st=document.createElement('div');
    st.className='status';
    if(state.phase==='reveal'){
      gd.textContent=G_EMOJI[p.gesture];
      card.classList.add('revealed');
    } else if(p.gesture){
      gd.textContent='★';
      st.textContent='鎖定';
      card.classList.add('locked');
    } else {
      gd.textContent='❓';
      st.textContent='待選';
    }
    card.appendChild(av);
    card.appendChild(gd);
    card.appendChild(st);
    playersEl.appendChild(card);
  });
  if(state.phase==='reveal') applyResults();
}

function applyResults(){
  const result=determineWinner();
  const cards=playersEl.querySelectorAll('.player-card');
  cards.forEach((card,i)=>{
    const p=state.players[i];
    if(result.type==='winners'){
      if(result.winnerIds.includes(p.charId)){
        card.classList.add('winner');
        card.querySelector('.status').textContent='👑 WINNER';
      } else {
        card.classList.add('loser');
        card.querySelector('.status').textContent='😵 敗北';
      }
    } else {
      card.classList.add('tie');
      card.querySelector('.status').textContent=result.msg||'🤝 平手';
    }
  });
}

function determineWinner(){
  const n=state.players.length;
  if(n<2) return {type:'none'};
  const allG=state.players.map(p=>p.gesture);
  const u=[...new Set(allG)];
  if(u.length===1) return {type:'tie',msg:'🤝 你們是同一種賽亞人嗎？'};
  if(u.length===3) return {type:'tie',msg:'🤝 三種拳都出現！勢均力敵！'};
  let w;
  if(u.includes('rock')&&u.includes('scissors')) w='rock';
  else if(u.includes('scissors')&&u.includes('paper')) w='scissors';
  else if(u.includes('paper')&&u.includes('rock')) w='paper';
  else return {type:'tie',msg:'🤝 平手！'};
  const wIds=state.players.filter(p=>p.gesture===w).map(p=>p.charId);
  if(wIds.length===1) return {type:'winners',winnerIds:wIds,msg:`👑 勝利者出現了！`};
  return {type:'winners',winnerIds:wIds,msg:`👑 ${wIds.length}人勝利！`};
}

function onCharClick(id){
  if(state.phase!=='select') return;
  if(!state.availChars.includes(id)) return;
  state.selCharId=id;
  state.phase='gesture';
  state.availChars=state.availChars.filter(c=>c!==id);
  renderPool();
  renderPlayers();
  gestureArea.classList.remove('hidden');
  promptEl.textContent=`👤 第${state.curPlayer+1}人 - 選擇你的招式 ↓`;
  updateDB();
}

gestureBtns.addEventListener('click',e=>{
  const btn=e.target.closest('.gesture-btn');
  if(!btn||state.phase!=='gesture') return;
  const g=btn.dataset.g;
  if(!g) return;
  state.players.push({charId:state.selCharId,gesture:g});
  state.selCharId=null;
  state.curPlayer++;
  state.phase='select';
  gestureArea.classList.add('hidden');
  renderPool();
  renderPlayers();
  updateDB();
  if(state.players.length>=2){revealBtn.classList.remove('hidden')}
  if(state.availChars.length===0) promptEl.textContent='⚡ 全員就位！按下決勝負！';
  else promptEl.textContent=`👤 第${state.curPlayer+1}人 - 選擇你的戰士 ↑`;
});

revealBtn.addEventListener('click',()=>{
  if(state.phase==='reveal'||state.players.length<2) return;
  state.phase='reveal';
  revealBtn.classList.add('hidden');
  gestureArea.classList.add('hidden');
  renderPlayers();
  const result=determineWinner();
  resultMsg.textContent=result.msg||'';
  replayBtn.classList.remove('hidden');
  promptEl.textContent='⚡ 勝負揭曉！⚡';
  spawnStars(5);
});

replayBtn.addEventListener('click',()=>{
  state.phase='select';state.curPlayer=0;state.players=[];
  state.availChars=CHAR_DATA.map(c=>c.id);state.selCharId=null;
  revealBtn.classList.add('hidden');
  replayBtn.classList.add('hidden');
  gestureArea.classList.add('hidden');
  resultMsg.textContent='';
  promptEl.textContent='👤 第1人 - 選擇你的戰士 ↑';
  renderPool();renderPlayers();updateDB();
});

function updateDB(){
  dbEl.innerHTML='';
  const n=state.players.length;
  const max=Math.min(7,CHAR_DATA.length);
  for(let i=0;i<max;i++){
    const db=document.createElement('div');
    db.className='db'+(i<n?' on':'');
    dbEl.appendChild(db);
  }
  const lbl=document.createElement('span');
  lbl.className='db-label';
  lbl.textContent=`${n}/${CHAR_DATA.length} 參戰`;
  dbEl.appendChild(lbl);
}

function spawnStars(count){
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='floating-star';
      s.textContent=['★','⚡','✨','🔥'][Math.floor(Math.random()*4)];
      s.style.left=(10+Math.random()*80)+'%';
      s.style.top=(30+Math.random()*40)+'%';
      s.style.fontSize=(12+Math.random()*12)+'px';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),2500);
    },i*200);
  }
}

/* ====== long press ====== */
function setupLongPress(el,id){
  let timer;
  const start=(e)=>{
    if(state.phase!=='select') return;
    if(!state.availChars.includes(id)) return;
    timer=setTimeout(()=>{
      timer=null;
      openCharMenu(id);
    },400);
  };
  const end=()=>{
    if(timer){clearTimeout(timer);timer=null}
  };
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',end);
  el.addEventListener('touchmove',end);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',end);
  el.addEventListener('mouseleave',end);
}

/* ====== char menu ====== */
function openCharMenu(id){
  state.menuCharId=id;
  overlay.classList.add('show');
  charMenu.classList.add('show');
}

function closeCharMenu(){
  overlay.classList.remove('show');
  charMenu.classList.remove('show');
  state.menuCharId=null;
}

overlay.addEventListener('click',closeCharMenu);

charMenu.addEventListener('click',e=>{
  const item=e.target.closest('[data-action]');
  if(!item) return;
  const action=item.dataset.action;
  const id=state.menuCharId;
  if(action==='cancel'){closeCharMenu();return}
  if(action==='reset'){
    closeCharMenu();
    removeCustom(id);
    renderPool();renderPlayers();
    return;
  }
  if(action==='camera'||action==='gallery'){
    state.pendingCharId=id;
    closeCharMenu();
    fileInput.removeAttribute('capture');
    if(action==='camera') fileInput.setAttribute('capture','environment');
    fileInput.value='';
    setTimeout(()=>fileInput.click(),100);
  }
});

fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file||state.pendingCharId==null) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    openAdjustModal(state.pendingCharId,ev.target.result);
    state.pendingCharId=null;
  };
  reader.readAsDataURL(file);
});

/* ====== adjust modal ====== */
let adjustState={id:null,dataUrl:null,zoom:1,px:50,py:50};
let dragState={active:false,startX:0,startY:0,startPx:50,startPy:50};

function openAdjustModal(id,dataUrl){
  state.adjustCharId=id;
  adjustState.id=id;
  adjustState.dataUrl=dataUrl;
  adjustState.zoom=1;
  adjustState.px=50;
  adjustState.py=50;
  zoomSlider.value=1;
  zoomLabel.textContent='1x';
  previewImg.style.backgroundImage=`url('${dataUrl}')`;
  previewImg.style.backgroundSize='cover';
  previewImg.style.backgroundPosition='50% 50%';
  overlay.classList.add('show');
  adjustModal.classList.add('show');
}

function closeAdjustModal(save){
  if(save){
    setCustom(adjustState.id,{
      dataUrl:adjustState.dataUrl,
      zoom:adjustState.zoom,
      px:adjustState.px,
      py:adjustState.py,
    });
    renderPool();renderPlayers();
  }
  overlay.classList.remove('show');
  adjustModal.classList.remove('show');
  previewImg.style.backgroundImage='';
  state.adjustCharId=null;
}

zoomSlider.addEventListener('input',()=>{
  const z=parseFloat(zoomSlider.value);
  zoomLabel.textContent=z.toFixed(1)+'x';
  adjustState.zoom=z;
  previewImg.style.backgroundSize=(z*100)+'% auto';
});

previewImg.addEventListener('mousedown',e=>{
  dragState.active=true;
  dragState.startX=e.clientX;
  dragState.startY=e.clientY;
  dragState.startPx=adjustState.px;
  dragState.startPy=adjustState.py;
  previewImg.classList.add('dragging');
});
document.addEventListener('mousemove',e=>{
  if(!dragState.active) return;
  const dx=e.clientX-dragState.startX;
  const dy=e.clientY-dragState.startY;
  const z=adjustState.zoom;
  const moveX=(dx/(200*z))*100;
  const moveY=(dy/(200*z))*100;
  let newPx=Math.max(0,Math.min(100,dragState.startPx+moveX));
  let newPy=Math.max(0,Math.min(100,dragState.startPy+moveY));
  adjustState.px=newPx;
  adjustState.py=newPy;
  previewImg.style.backgroundPosition=newPx+'% '+newPy+'%';
});
document.addEventListener('mouseup',()=>{
  if(!dragState.active) return;
  dragState.active=false;
  previewImg.classList.remove('dragging');
});

previewImg.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  dragState.active=true;
  dragState.startX=t.clientX;
  dragState.startY=t.clientY;
  dragState.startPx=adjustState.px;
  dragState.startPy=adjustState.py;
},{passive:true});
previewImg.addEventListener('touchmove',e=>{
  if(!dragState.active||e.touches.length!==1) return;
  const t=e.touches[0];
  const dx=t.clientX-dragState.startX;
  const dy=t.clientY-dragState.startY;
  const z=adjustState.zoom;
  const moveX=(dx/(200*z))*100;
  const moveY=(dy/(200*z))*100;
  let newPx=Math.max(0,Math.min(100,dragState.startPx+moveX));
  let newPy=Math.max(0,Math.min(100,dragState.startPy+moveY));
  adjustState.px=newPx;
  adjustState.py=newPy;
  previewImg.style.backgroundPosition=newPx+'% '+newPy+'%';
},{passive:true});
previewImg.addEventListener('touchend',()=>{
  dragState.active=false;
});

document.getElementById('adjust-cancel').addEventListener('click',()=>closeAdjustModal(false));
document.getElementById('adjust-confirm').addEventListener('click',()=>closeAdjustModal(true));
document.getElementById('modal-bg-close').addEventListener('click',()=>closeAdjustModal(false));

/* ====== init ====== */
promptEl.textContent='👤 第1人 - 選擇你的戰士 ↑';
renderPool();renderPlayers();updateDB();
</script>
</body>
</html>
